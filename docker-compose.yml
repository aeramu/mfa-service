version: '3.8'

services:
  mfa-service:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mailpit
    volumes:
      - ./keys:/usr/local/bin/keys:ro
    env_file:
      - .env
    environment:
      # Override local .env settings to use internal Docker network hostnames
      - REDIS_URL=redis://redis:6379/
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP Server
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  redis_data:
