<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { background-color: #18181b; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .content { padding: 32px; text-align: center; }
        .content p { color: #3f3f46; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
        .otp-box { background-color: #f4f4f5; border: 1px solid #e4e4e7; border-radius: 6px; padding: 16px; margin-bottom: 24px; }
        .otp-code { font-family: monospace; font-size: 32px; font-weight: 700; letter-spacing: 4px; color: #09090b; margin: 0; }
        .footer { background-color: #fafafa; border-top: 1px solid #f4f4f5; padding: 20px; text-align: center; }
        .footer p { color: #a1a1aa; font-size: 12px; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Authentication Request</h1>
        </div>
        <div class="content">
            <p>You requested a one-time password (OTP) to authenticate your account. Please use the following code:</p>
            <div class="otp-box">
                <p class="otp-code">{{ otp_code }}</p>
            </div>
            <p>This code will expire in {{ expiration_minutes }} minutes. If you did not request this, please ignore this email.</p>
        </div>
        <div class="footer">
            <p>&copy; MFA Service. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
